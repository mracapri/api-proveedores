steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/demo-api-core', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/demo-api-core']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv:
      - DEMO_API_CORE_DB_HOST
      - DEMO_API_CORE_DB_NAME
      - DEMO_API_CORE_DB_PASSWORD
      - DEMO_API_CORE_DB_PORT
      - DEMO_API_CORE_DB_USER
      - DEMO_API_NOTIFICADOR_COLA
      - DEMO_API_CORE_LLAVE_CIFRADO 
      - DEMO_API_CORE_JWT_SECRET_KEY
    args:
      - '-c'
      - |
        gcloud run deploy proveedores-api-core \
          --image gcr.io/$PROJECT_ID/portal-proveedores-api-core \
          --platform managed \
          --region us-central1 \
          --no-allow-unauthenticated \
          --service-account demo-api-runtime@$PROJECT_ID.iam.gserviceaccount.com \
          --set-env-vars DEMO_STORAGE_BUCKET=${_DEMO_STORAGE_BUCKET} \
          --set-secrets "DEMO_API_CORE_DB_HOST=DEMO_API_CORE_DB_HOST:latest,DEMO_API_CORE_DB_NAME=DEMO_API_CORE_DB_NAME:latest,DEMO_API_CORE_DB_PASSWORD=DEMO_API_CORE_DB_PASSWORD:latest,DEMO_API_CORE_DB_PORT=DEMO_API_CORE_DB_PORT:latest,DEMO_API_CORE_DB_USER=DEMO_API_CORE_DB_USER:latest,DEMO_API_NOTIFICADOR_COLA=DEMO_API_NOTIFICADOR_COLA:latest,DEMO_API_CORE_LLAVE_CIFRADO=DEMO_API_CORE_LLAVE_CIFRADO:latest, DEMO_API_CORE_JWT_SECRET_KEY=DEMO_API_CORE_JWT_SECRET_KEY:latest"

images:
  - 'gcr.io/$PROJECT_ID/portal-proveedores-api-core'

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_CORE_DB_HOST/versions/latest
      env: DEMO_API_CORE_DB_HOST
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_CORE_DB_NAME/versions/latest
      env: DEMO_API_CORE_DB_NAME
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_CORE_DB_PASSWORD/versions/latest
      env: DEMO_API_CORE_DB_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_CORE_DB_PORT/versions/latest
      env: DEMO_API_CORE_DB_PORT
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_CORE_DB_USER/versions/latest
      env: DEMO_API_CORE_DB_USER
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_NOTIFICADOR_COLA/versions/latest
      env: DEMO_API_NOTIFICADOR_COLA
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_CORE_LLAVE_CIFRADO/versions/latest
      env: DEMO_API_CORE_LLAVE_CIFRADO
    - versionName: projects/$PROJECT_ID/secrets/DEMO_API_CORE_JWT_SECRET_KEY/versions/latest
      env: DEMO_API_CORE_JWT_SECRET_KEY

substitutions:
  _DEMO_STORAGE_BUCKET: deposito-fiscal